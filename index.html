<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">

    <title>RPG</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="outerContainer">
        <h3 class="written-in-ink"><a href="https://www.inklestudios.com/ink">WRITTEN IN INK</a></h3>

        <div id="controls" class="buttons">
          <a id="rewind" title="Restart story from beginning">restart</a>
          <span id="slot-selector">
            slot:
            <a class="slot-btn" data-slot="1" title="Slot 1">1</a>
            <a class="slot-btn" data-slot="2" title="Slot 2">2</a>
            <a class="slot-btn" data-slot="3" title="Slot 3">3</a>
          </span>
          <a id="save" title="Save to current slot">save</a>
          <a id="reload" title="Load from current slot">load</a>
          <a id="theme-switch" title="Switch theme">theme</a>
        </div>

        <div id="story" class="container">
            <div class="header">
                <h1>RPG</h1>
                <h2 class="byline"></h2>
            </div>
        </div>
    </div>

    <script src="ink.js"></script>
    <script src="RPG.js"></script>
    <script src="main.js"></script>
</body>
</html>
